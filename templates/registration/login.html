<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Cuervo Negro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background:#0a0a0a; color:#e8e0d0; font-family:'Rajdhani',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background-image:radial-gradient(ellipse at center, rgba(139,26,26,0.08) 0%, transparent 70%); }
        .login-wrap { width:100%; max-width:420px; padding:1rem; }
        h1 { font-family:'Bebas Neue',sans-serif; font-size:3.5rem; letter-spacing:6px; color:#c8a951; text-shadow:0 0 40px rgba(200,169,81,0.4); line-height:1; margin:0; }
        h1 span { color:#8b1a1a; }
        .login-sub { font-family:'Share Tech Mono',monospace; font-size:0.65rem; letter-spacing:5px; color:#555; }
        .skull { font-size:3rem; animation:pulse 3s infinite; }
        @keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
        .login-box { background:#111; border:1px solid #2a2a2a; border-top:2px solid #c8a951; padding:2rem; border-radius:2px; }
        .form-label { font-family:'Share Tech Mono',monospace; font-size:0.7rem; letter-spacing:2px; color:#666; text-transform:uppercase; }
        .form-control { background:#0d0d0d!important; border:1px solid #2a2a2a!important; color:#e8e0d0!important; border-radius:2px!important; }
        .form-control:focus { border-color:#c8a951!important; box-shadow:0 0 0 2px rgba(200,169,81,0.15)!important; }
        .btn-login { width:100%; background:#c8a951; border:none; color:#000; font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1rem; letter-spacing:4px; text-transform:uppercase; padding:0.75rem; border-radius:2px; transition:all 0.2s; }
        .btn-login:hover { background:#e0be65; transform:translateY(-1px); box-shadow:0 6px 20px rgba(200,169,81,0.3); }
        .error-msg { background:rgba(139,26,26,0.1); border-left:3px solid #8b1a1a; padding:0.6rem 0.8rem; font-size:0.85rem; margin-bottom:1rem; }
        .input-eye { position:relative; }
        .input-eye .form-control { padding-right:2.5rem; }
        .btn-eye { position:absolute; right:0.6rem; top:50%; transform:translateY(-50%); background:none; border:none; color:#555; cursor:pointer; padding:0; font-size:1rem; line-height:1; transition:color 0.2s; }
        .btn-eye:hover { color:#c8a951; }
        @media (max-width: 480px) {
            h1 { font-size:2.6rem; letter-spacing:4px; }
            .login-box { padding:1.5rem 1.25rem; }
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="text-center mb-4">
        <div class="skull">☠</div>
        <h1>CUERVO <span>NEGRO</span></h1>
        <p class="login-sub mt-1">BARBER · TATTOO · SISTEMA DE GESTIÓN</p>
    </div>
    <div class="login-box">
        {% if form.errors %}
        <div class="error-msg"><i class="bi bi-exclamation-triangle me-2"></i>Credenciales incorrectas.</div>
        {% endif %}
        <form method="post">{% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="username" class="form-control" autofocus placeholder="usuario" required inputmode="text" autocomplete="username">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-eye">
                    <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
                    <button type="button" class="btn-eye" id="togglePassword" tabindex="-1">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn-login">⚡ ACCEDER</button>
        </form>
    </div>
</div>
<script>
    const toggle = document.getElementById('togglePassword');
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    toggle.addEventListener('click', () => {
        const visible = input.type === 'text';
        input.type = visible ? 'password' : 'text';
        icon.className = visible ? 'bi bi-eye' : 'bi bi-eye-slash';
    });
</script>
</body>
</html>
